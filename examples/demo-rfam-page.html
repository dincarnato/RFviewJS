    transitionDuration: 0,
    relaxedSequence: true, // Enables custom sequence alphabet (i.e., IUPAC codes)
    showIndices: true,
    toolbarPosition: 'left',

    buttons: {
      manualInput: false,
      upload: false,
      cleanOne: false,
      cleanAll: false,
      zoomIn: true,
      zoomOut: true,
      fit: true,
      reset: true,
      save: true,
      indices: false,
      colorMap: false,
      toolbarPos: false,
      rfam: false,
    },

    statusBar: true,
    canvasDrop: false,

  });

    showColors: true,
    structures: [
      // Stockholm alignment (first, with covariation loaded below)
      ...RFviewJS.parseStockholmFile(_STO, 'R-scape'),

      // Annotation tracks — same sequence/structure, different values/colormaps
      { label: 'seqcons', sequence: SEQ, structure: STR, values: VALS_SEQCONS, colorMap: CM_SEQCONS },

  });

  viewer.switchToStructure(0);

    viewer.loadCov(_COV);

  }

  try {
    viewer.loadCov(_HLXCOV);
  } catch (e) {
    console.warn('Helix covariation loading error:', e.message);
  }
